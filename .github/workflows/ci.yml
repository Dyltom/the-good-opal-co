name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: goodopalco
          POSTGRES_PASSWORD: goodopalcopass
          POSTGRES_DB: goodopalco_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U goodopalco -d goodopalco_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://goodopalco:goodopalcopass@localhost:5432/goodopalco_test
      PAYLOAD_SECRET: ci-payload-secret-at-least-thirty-two-characters
      QUOTE_LINK_SECRET: ci-quote-link-secret-at-least-thirty-two-characters
      ADMIN_EMAIL: owner@example.com
      NEXT_PUBLIC_APP_URL: https://ci.goodopal.test
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
      RESEND_API_KEY: re_ci_placeholder
      EMAIL_FROM: The Good Opal Co <ci@example.com>
      CONTACT_EMAIL: ci@example.com
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm payload migrate
      - run: pnpm seed
        env:
          SEED_PUBLISH: 'true'
      - run: pnpm test:unit --run
      - run: pnpm validate:build
        env:
          BLOB_READ_WRITE_TOKEN: vercel_blob_rw_cibuildstore_abcdefghijklmnopqrstuvwxyz1234567890
          UPSTASH_REDIS_REST_URL: https://ci-build-only.invalid
          UPSTASH_REDIS_REST_TOKEN: ci-build-only
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
